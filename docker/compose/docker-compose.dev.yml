# 开发环境配置
# 使用方式: docker compose -f docker-compose.base.yml -f docker-compose.dev.yml --env-file .env.dev up -d

services:
  skillhub:
    container_name: skills-hub-dev
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=debug
      - RUN_MODE=dev
    env_file:
      - .env.dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    container_name: skills-hub-dev-postgres
    ports:
      - "5432:5432"

  redis:
    container_name: skills-hub-dev-redis
    ports:
      - "6379:6379"