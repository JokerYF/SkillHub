# 生产环境配置
# 使用方式: docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  skillhub:
    container_name: skills-hub-prod
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - RUST_LOG=info
      - RUN_MODE=prod
    env_file:
      - .env.prod
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 生产环境健康检查更严格
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    container_name: skills-hub-prod-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  redis:
    container_name: skills-hub-prod-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M