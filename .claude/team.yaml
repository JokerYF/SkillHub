name: skills-hub-team
description: Skills Intelligence Hub 开发团队

# 任务总结配置
daily_summary:
  enabled: true
  path: .claude/daily-summaries
  filename_pattern: "{YYYY-MM-DD}.md"

# 任务类型 → 角色映射规则
task_rules:
  - keywords: [实现, 开发, 添加, 新建]
    type: feature
    workflow: [architect, ui-designer, "parallel: [backend, frontend]", developer, tester, developer]

  - keywords: [审查, review, 检查]
    type: review
    workflow: [architect]

  - keywords: [测试, test, 验证]
    type: test
    workflow: [tester]

  - keywords: [修复, fix, bug]
    type: bugfix
    workflow: [backend, developer, tester, developer]

  - keywords: [设计, 架构, 方案]
    type: design
    workflow: [architect]

  - keywords: [构建, 镜像, image, build]
    type: build-image
    workflow: [developer, tester]

  - keywords: [部署, deploy, 云端, 环境]
    type: deploy
    workflow: [developer]

  - keywords: [UI, 界面, 交互, 体验, 样式]
    type: ui-design
    workflow: [ui-designer]

# 成员定义
members:
  - id: architect
    name: 架构师
    skill: .claude/skills/team/architect.md

  - id: ui-designer
    name: UI交互工程师
    skill: .claude/skills/team/ui-designer.md

  - id: backend
    name: 后端开发
    skill: .claude/skills/team/backend.md

  - id: frontend
    name: 前端开发
    skill: .claude/skills/team/frontend.md

  - id: developer
    name: 部署专员
    skill: .claude/skills/team/developer.md

  - id: tester
    name: 测试工程师
    skill: .claude/skills/team/tester.md