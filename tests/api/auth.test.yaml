# 认证 API 测试用例
# Skills Intelligence Hub - Phase 1 MVP

metadata:
  suite: auth
  version: "1.0.0"
  created: "2026-03-25"
  author: "tester"

test_cases:
  TC-AUTH-001:
    name: "用户注册 - 正常流程"
    priority: "P0"
    endpoint: "/api/auth/register"
    method: "POST"
    description: "验证用户可以正常注册"
    preconditions:
      - "数据库服务正常"
      - "用户名未被占用"
    test_steps:
      - step: 1
        action: "发送注册请求"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser_{{timestamp}}"
            email: "testuser_{{timestamp}}@example.com"
            password: "Test@123456"
        expected:
          status_code: 201
          response: null  # 201 Created 无响应体
    postconditions:
      - "用户记录已创建"
      - "用户状态为 active"

  TC-AUTH-002:
    name: "用户注册 - 重复用户名"
    priority: "P1"
    endpoint: "/api/auth/register"
    method: "POST"
    description: "验证重复用户名注册返回正确错误"
    preconditions:
      - "用户 testuser_duplicate 已存在"
    test_steps:
      - step: 1
        action: "使用已存在的用户名注册"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser_duplicate"
            email: "another@example.com"
            password: "Test@123456"
        expected:
          status_code: 409
          response:
            error: "Conflict"
            message: "用户名已存在"
    cleanup:
      - "删除测试用户"

  TC-AUTH-003:
    name: "用户登录 - 正常流程"
    priority: "P0"
    endpoint: "/api/auth/login"
    method: "POST"
    description: "验证用户可以正常登录并获取 JWT Token"
    preconditions:
      - "用户 testuser_login 已创建"
      - "密码: Test@123456"
    test_steps:
      - step: 1
        action: "发送登录请求"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser_login"
            password: "Test@123456"
        expected:
          status_code: 200
          response:
            token: "{{jwt_token}}"
    validation:
      - "响应包含 token 字段"
      - "token 为有效的 JWT 格式"

  TC-AUTH-004:
    name: "用户登录 - 密码错误"
    priority: "P1"
    endpoint: "/api/auth/login"
    method: "POST"
    description: "验证密码错误时返回 401"
    preconditions:
      - "用户 testuser_login 已创建"
    test_steps:
      - step: 1
        action: "使用错误密码登录"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser_login"
            password: "WrongPassword@123"
        expected:
          status_code: 401
          response:
            error: "Unauthorized"
            message: "用户名或密码错误"

  TC-AUTH-005:
    name: "用户登录 - 用户不存在"
    priority: "P1"
    endpoint: "/api/auth/login"
    method: "POST"
    description: "验证用户不存在时返回 401"
    preconditions: []
    test_steps:
      - step: 1
        action: "使用不存在的用户登录"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "nonexistent_user"
            password: "AnyPassword@123"
        expected:
          status_code: 401
          response:
            error: "Unauthorized"
            message: "用户名或密码错误"

  TC-AUTH-006:
    name: "Token 刷新"
    priority: "P1"
    endpoint: "/api/auth/refresh"
    method: "POST"
    description: "验证已登录用户可以刷新 Token"
    preconditions:
      - "用户已登录，持有有效 JWT Token"
    test_steps:
      - step: 1
        action: "发送刷新请求"
        request:
          headers:
            Authorization: "Bearer {{valid_token}}"
        expected:
          status_code: 200
          response:
            token: "{{new_jwt_token}}"
    validation:
      - "新 token 与旧 token 不同"
      - "新 token 为有效的 JWT 格式"

  TC-AUTH-007:
    name: "获取当前用户信息"
    priority: "P1"
    endpoint: "/api/users/me"
    method: "GET"
    description: "验证可以获取当前登录用户信息"
    preconditions:
      - "用户已登录，持有有效 JWT Token"
    test_steps:
      - step: 1
        action: "获取当前用户信息"
        request:
          headers:
            Authorization: "Bearer {{valid_token}}"
        expected:
          status_code: 200
          response:
            id: "{{user_id}}"
            username: "{{username}}"
            email: "{{email}}"
            role: "{{role}}"

  TC-AUTH-008:
    name: "注册 - 参数验证 - 用户名过短"
    priority: "P2"
    endpoint: "/api/auth/register"
    method: "POST"
    description: "验证用户名过短时返回 400"
    preconditions: []
    test_steps:
      - step: 1
        action: "发送用户名过短的注册请求"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: ""
            email: "test@example.com"
            password: "Test@123456"
        expected:
          status_code: 400
          response:
            error: "BadRequest"

  TC-AUTH-009:
    name: "注册 - 参数验证 - 密码过短"
    priority: "P2"
    endpoint: "/api/auth/register"
    method: "POST"
    description: "验证密码过短时返回 400"
    preconditions: []
    test_steps:
      - step: 1
        action: "发送密码过短的注册请求"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser"
            email: "test@example.com"
            password: "short"
        expected:
          status_code: 400
          response:
            error: "BadRequest"
            message: "密码长度至少为 8 位"

  TC-AUTH-010:
    name: "注册 - 参数验证 - 邮箱格式错误"
    priority: "P2"
    endpoint: "/api/auth/register"
    method: "POST"
    description: "验证邮箱格式错误时返回 400"
    preconditions: []
    test_steps:
      - step: 1
        action: "发送邮箱格式错误的注册请求"
        request:
          headers:
            Content-Type: "application/json"
          body:
            username: "testuser"
            email: "invalid-email"
            password: "Test@123456"
        expected:
          status_code: 400
          response:
            error: "BadRequest"

  TC-AUTH-011:
    name: "Token 刷新 - 无 Token"
    priority: "P2"
    endpoint: "/api/auth/refresh"
    method: "POST"
    description: "验证无 Token 时返回 401"
    preconditions: []
    test_steps:
      - step: 1
        action: "发送刷新请求不带 Token"
        request:
          headers: {}
        expected:
          status_code: 401

  TC-AUTH-012:
    name: "健康检查"
    priority: "P0"
    endpoint: "/api/health"
    method: "GET"
    description: "验证服务健康检查端点"
    preconditions: []
    test_steps:
      - step: 1
        action: "发送健康检查请求"
        request:
          headers: {}
        expected:
          status_code: 200
          response: "OK"